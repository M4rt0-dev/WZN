<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg   { fill: #111111; }
    .w    { stroke: #ffffff; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #f0f0f0; }
      .w  { stroke: #cc1111; }
    }
  </style>

  <!-- Background -->
  <rect class="bg" width="32" height="32" rx="7"/>

  <!-- W letterform -->
  <polyline class="w"
            points="3.5,7 8.5,25 16,13.5 23.5,25 28.5,7"
            fill="none"
            stroke-width="3.8"
            stroke-linecap="round"
            stroke-linejoin="round"/>
</svg>
